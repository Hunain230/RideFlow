<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RideFlow — Sign In</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div>
<div class="login-bg">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">R</div>
      <div class="login-title">RideFlow</div>
      <div class="login-sub">Ride-Hailing Database Platform</div>
    </div>

    <div class="demo-box">
      🔑 <strong>Demo login</strong> — password = first name<br>
      <strong>ali.raza@rideflow.pk</strong> / <strong>ali</strong> → Admin<br>
      <strong>sara.ahmed@gmail.com</strong> / <strong>sara</strong> → Rider<br>
      <strong>bilal.driver@gmail.com</strong> / <strong>bilal</strong> → Driver
    </div>

    <div class="err-msg" id="err"></div>

    <div class="form-grp">
      <label class="form-lbl">Email</label>
      <input id="email" type="email" class="form-ctrl" placeholder="you@example.com" autofocus>
    </div>
    <div class="form-grp" style="margin-bottom:20px">
      <label class="form-lbl">Password</label>
      <input id="pass" type="password" class="form-ctrl" placeholder="Your first name">
    </div>

    <button id="login-btn" class="btn btn-primary" style="width:100%" onclick="doLogin()">
      Sign In
    </button>
  </div>
</div>
<script>
async function doLogin() {
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('err');
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value.trim();
  err.style.display = 'none';
  if (!email || !pass) { err.textContent = 'Please enter your email and password.'; err.style.display = 'block'; return; }
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>&nbsp;Signing in…';
  try {
    const res  = await fetch('/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email, password: pass }) });
    const data = await res.json();
    if (res.ok) { window.location.href = data.redirect; }
    else { err.textContent = data.error || 'Login failed.'; err.style.display='block'; btn.disabled=false; btn.textContent='Sign In'; }
  } catch { err.textContent='Network error. Is the server running?'; err.style.display='block'; btn.disabled=false; btn.textContent='Sign In'; }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
